<HEAD>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <!-- <SCRIPT SRC="../ganja.js"></SCRIPT> -->
  <SCRIPT SRC="https://unpkg.com/ganja.js"></SCRIPT>
  <STYLE>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    #app {
      display: flex;
      flex-direction: row;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #controls {
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 10px;
      width: 150px;
      flex-shrink: 0;
      overflow-y: auto;
      box-sizing: border-box;
    }

    #canvas-wrap {
      flex: 1;
      overflow: hidden;
    }

    #rotate-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      color: #fff;
      font-size: 1.2rem;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 100;
    }

    @media (orientation:portrait) {
      #rotate-msg {
        display: flex;
      }
    }
  </STYLE>
</HEAD>

<!-- I have two options:
1. Use Ganja's graph function:
  1.1 regenerate graph each time if an interaction occur
  1.2 modify the basic interaction so I can relocate a line on a mouse action
2. Use Dom to render svg like game_wedge
Next step: 1. dynamic of boat and a const force line
2. deminished force line -->

<BODY>
  <div id="rotate-msg">Please rotate your device<br>to landscape mode</div>
  <div id="app">
    <div id="controls"></div>
    <div id="canvas-wrap"></div>
  </div>
  <SCRIPT>
    try { screen.orientation.lock('landscape').catch(function () { }); } catch (e) { }

    Algebra(2, 0, 1, () => {
      var pt = (x, y) => !(1e0 + x * 1e1 + y * 1e2),
        vec = (x, y) => !(x * 1e1 + y * 1e2),
        Euvec = (x, y) => (x * 1e1 + y * 1e2),
        RK4 = (f, y, h) => {
          var k1 = f(y), k2 = f(y + 0.5 * h * k1), k3 = f(y + 0.5 * h * k2), k4 = f(y + h * k3);
          return y + (h / 3) * (k2 + k3 + (k1 + k4) * 0.5);
        };

      var A = pt(0, 0), B = pt(0, 1)

      // ellipse
      var O = pt(0.1, 0), a = 0.3, b = 0.1
      var curve = (pts) => pts.map((pt, i, arr) => [pt, pts[i + 1 % arr.length]])
      var L = Element.Vector;
      var line = Element.Vector;
      var N = 100, Nc = 30
      var circle_pts = [...Array(Nc)].map((x, i) => () => O + vec(a * Math.cos(i * 2 * Math.PI / Nc), b * Math.sin(i * 2 * Math.PI / Nc))),
        circle = curve(circle_pts);
      circle.push(A)

      //inertia
      var R = 1;
      var I = 128 * 1e01 + 128 * 1e02 + 0.14e12,
        J = (x) => x.Dual.map((x, i) => x * (I[i] || 1)),
        Ji = (x) => x.map((x, i) => x / (I[i] || 1)).UnDual;

      var State = [1, 0e12],
        dState = ([g, v]) => [-0.5 * g * v, Ji(forques(g, v) - 0.5 * (J(v) * v - v * J(v)))];

      var power = 2
      var streamline = 1
      var rotation = 1
      var lateral = 8
      var strokeTime = 500
      var forques = (M, B) => {
        var Stroke = power * (~M >>> line),
          Damping = !(-streamline * B.e01 * 1e01 - lateral * B.e02 * 1e02 - rotation * B.e12 * 1e12);
        return Stroke + Damping;
      }

      const isMobile = (typeof navigator !== 'undefined') && (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || (navigator.maxTouchPoints || 0) > 1);
      const rkStep = isMobile ? 0.02 : 0.01;

      var controlsDiv = document.getElementById('controls');
      var canvasDiv = document.getElementById('canvas-wrap');
      line = ()=> L

      let canvas = this.graph(() => {
        State = RK4(dState, State, rkStep);
        State[0] = State[0].Normalized;
        return [
          0x00AA88, ...State[0] >>> circle,
          0x444444, line
        ]
      }, { animate: true, grid: true, lineWidth: 4 })
      canvas.id = 'mycanvas'
      canvasDiv.appendChild(canvas);

      function resizeCanvas() {
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.display = 'block';
        try {
          if (canvas.tagName && canvas.tagName.toLowerCase() === 'canvas') {
            const ratio = window.devicePixelRatio || 1;
            const cw = canvasDiv.clientWidth || window.innerWidth;
            const ch = canvasDiv.clientHeight || window.innerHeight;
            canvas.width = Math.round(cw * ratio);
            canvas.height = Math.round(ch * ratio);
            const ctx = canvas.getContext && canvas.getContext('2d');
            if (ctx && ctx.setTransform) ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
          }
        } catch (err) { }
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      window.addEventListener('orientationchange', resizeCanvas);

      var cx, cy, bx, by, timerId;

      canvas.style.touchAction = 'none';

      function getXYFromEvent(e) {
        if (e.touches && e.touches.length) {
          const t = e.touches[0];
          return { x: t.clientX, y: t.clientY };
        }
        if (e.changedTouches && e.changedTouches.length) {
          const t = e.changedTouches[0];
          return { x: t.clientX, y: t.clientY };
        }
        return { x: e.clientX, y: e.clientY };
      }

      function canvasCoords(p) {
        var rect = canvas.getBoundingClientRect();
        var rx = (p.x - rect.left) / rect.width;
        var ry = (p.y - rect.top) / rect.height;
        var w = rect.width, h = rect.height;
        return {
          x: (rx - 0.5) * 4 * (w > h ? (w / h) : 1),
          y: (-ry + 0.5) * 4 * (h > w ? (h / w) : 1)
        };
      }

      function pointerDownHandler(e) {
        if (timerId) { clearTimeout(timerId); timerId = null; }
        var c = canvasCoords(getXYFromEvent(e));
        cx = c.x; cy = c.y;
        try { e.target && e.target.setPointerCapture && e.target.setPointerCapture(e.pointerId); } catch (err) { }
        if (e.preventDefault) e.preventDefault();
      }

      function pointerUpHandler(e) {
        var c = canvasCoords(getXYFromEvent(e));
        bx = c.x; by = c.y;
        R = State[0];
        B = pt(bx, by);
        let fv = Euvec(bx - cx, by - cy);
        L = B | fv.Normalized;
        timerId = setTimeout(function () { L = Element.Vector; }, strokeTime);
        try { e.target && e.target.releasePointerCapture && e.target.releasePointerCapture(e.pointerId); } catch (err) { }
        if (e.preventDefault) e.preventDefault();
      }

      function cancelHandler(e) {
        if (timerId) { clearTimeout(timerId); timerId = null; }
        L = Element.Vector;
        try { e.target && e.target.releasePointerCapture && e.target.releasePointerCapture(e.pointerId); } catch (err) { }
      }

      canvas.addEventListener('pointerdown', pointerDownHandler);
      canvas.addEventListener('pointerup', pointerUpHandler);
      canvas.addEventListener('pointercancel', cancelHandler);
      canvas.addEventListener('pointerleave', cancelHandler);
      canvas.addEventListener('touchstart', pointerDownHandler, { passive: false });
      canvas.addEventListener('touchend', pointerUpHandler, { passive: false });
      canvas.addEventListener('touchcancel', cancelHandler, { passive: false });

      function makeSlider(labelText, min, max, step, initVal, onChange) {
        var wrap = document.createElement('div');
        wrap.style.cssText = 'display:flex;flex-direction:column;gap:2px;';
        var header = document.createElement('div');
        header.style.cssText = 'display:flex;justify-content:space-between;font-size:0.85rem;';
        var lbl = document.createElement('span'); lbl.textContent = labelText;
        var val = document.createElement('span'); val.textContent = initVal.toFixed(2);
        header.appendChild(lbl); header.appendChild(val);
        var input = document.createElement('input');
        input.type = 'range'; input.min = String(min); input.max = String(max);
        input.step = String(step); input.value = String(initVal);
        input.style.width = '100%';
        input.addEventListener('input', function () { var v = parseFloat(input.value); val.textContent = v.toFixed(2); onChange(v); });
        wrap.appendChild(header); wrap.appendChild(input);
        return wrap;
      }
      function makeButton(labelText, event) {
        var btn = document.createElement('button');
        btn.textContent = labelText;
        btn.style.cssText = 'padding:8px;font-size:0.9rem;cursor:pointer;width:100%;';
        btn.addEventListener('click', event);
        return btn;
      }

      controlsDiv.appendChild(makeButton('back to center', function () { State = [1, 0e12]; }));
      controlsDiv.appendChild(makeButton('sweep', function () { line = ()=>(~(State[0] / R)) >>> L; }));
      controlsDiv.appendChild(makeButton('forward', function () { line = ()=>L; }));
      controlsDiv.appendChild(makeButton('draw', function () { line = ()=>(State[0] / R) >>> L; }));
      controlsDiv.appendChild(makeSlider('stroke duration', 300, 2000, 50, strokeTime, function (v) { strokeTime = v; }));
      controlsDiv.appendChild(makeSlider('time step', 0.005, 0.04, 0.002, rkStep, function (v) { rkStep = v; }));
      controlsDiv.appendChild(makeSlider('lateral drag', 1, 15, 0.2, lateral, function (v) { power = v; }));
      controlsDiv.appendChild(makeSlider('power', 0.5, 4, 0.1, power, function (v) { power = v; }));
      controlsDiv.appendChild(makeSlider('streamline drag', 0.1, 4, 0.1, streamline, function (v) { streamline = v; }));
      controlsDiv.appendChild(makeSlider('rotation drag', 0.1, 4, 0.1, rotation, function (v) { rotation = v; }));
    })
  </SCRIPT>
</BODY>
