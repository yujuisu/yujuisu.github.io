<!-- I have two options:
1. Use Ganja's graph function:
  1.1 regenerate graph each time if an interaction occur
  1.2 modify the basic interaction so I can relocate a line on a mouse action
2. Use Dom to render svg like game_wedge
Next step: 1. dynamic of boat and a const force line
2. deminished force line -->

<BODY STYLE="display:flex; flex-direction:column; max-height:100%;">
  <SCRIPT>
    Algebra(2, 0, 1, () => {
      var pt = (x, y) => !(1e0 + x * 1e1 + y * 1e2),
        vec = (x, y) => !(x * 1e1 + y * 1e2),
        Euvec = (x, y) => (x * 1e1 + y * 1e2),
        RK4 = (f, y, h) => {
          var k1 = f(y), k2 = f(y + 0.5 * h * k1), k3 = f(y + 0.5 * h * k2), k4 = f(y + h * k3);
          return y + (h / 3) * (k2 + k3 + (k1 + k4) * 0.5);
        };

      var A = pt(0, 0), B = pt(0, 1)

      // ellipse
      var O = pt(0.1, 0), a = 0.3, b = 0.1
      var curve = (pts) => pts.map((pt, i, arr) => [pt, pts[i + 1 % arr.length]])
      var L = Element.Vector;
      var N = 100, Nc = 30
      var circle_pts = [...Array(Nc)].map((x, i) => () => O + vec(a * Math.cos(i * 2 * Math.PI / Nc), b * Math.sin(i * 2 * Math.PI / Nc))),
        circle = curve(circle_pts);
      circle.push(A)
      // var MassPoints = [pt(-0.2, 0), pt(0, 0.1), pt(0.4, 0), pt(0, -0.1)],
      //   circle = curve(MassPoints);

      //inertia
      var R = 1;
      var I = 128 * 1e01 + 128 * 1e02 + 0.14e12,
        J = (x) => x.Dual.map((x, i) => x * (I[i] || 1)),
        Ji = (x) => x.map((x, i) => x / (I[i] || 1)).UnDual;

      var State = [1, 0e12],
        dState = ([g, v]) => [-0.5 * g * v, Ji(forques(g, v) - 0.5 * (J(v) * v - v * J(v)))];

      // var along_force = (State[0]/R) >>> L;
      var power = 2
      var streamline = 3
      var rotation = 1
      var forques = (M, B) => {
        var Stroke = power * (~M >>> (State[0] / R) >>> L),
          Damping = !(-1.2 / streamline * B.e01 * 1e01 - 1.2 * B.e02 * 1e02 - 1.2 / rotation * B.e12 * 1e12);
        return Stroke + Damping;
      }

      // Use a larger integration step on mobile devices for performance
      const isMobile = (typeof navigator !== 'undefined') && (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || (navigator.maxTouchPoints || 0) > 1);
      const rkStep = isMobile ? 0.02 : 0.01;

      let canvas = this.graph(() => {
        State = RK4(dState, State, rkStep);
        State[0] = State[0].Normalized;
        return [
          0x00AA88, ...State[0] >>> circle,
          0x444444, (State[0] / R) >>> L
        ]
      }, { animate: true, grid: true, lineWidth: 4 })
      canvas.id = 'mycanvas'
      document.body.appendChild(canvas);
      // Make canvas fit the device width on mobile while keeping an aspect ratio
      function resizeCanvasToWidth() {
        // Ensure it fills the available width
        canvas.style.width = '100%';
        canvas.style.maxWidth = '100vw';
        canvas.style.display = 'block';
        // Choose an aspect ratio (width / height). Adjust as needed.
        const aspect = 3 / 2;
        const cw = canvas.clientWidth || window.innerWidth;
        const ch = Math.round(cw / aspect);
        canvas.style.height = ch + 'px';

        // If the returned element is an actual <canvas>, scale its pixel buffer for high-DPI
        try {
          if (canvas.tagName && canvas.tagName.toLowerCase() === 'canvas') {
            const ratio = window.devicePixelRatio || 1;
            canvas.width = Math.round(cw * ratio);
            canvas.height = Math.round(ch * ratio);
            const ctx = canvas.getContext && canvas.getContext('2d');
            if (ctx && ctx.setTransform) ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
          }
        } catch (err) { /* ignore if not a canvas */ }
      }

      // Initial size and on resize/orientation change
      resizeCanvasToWidth();
      window.addEventListener('resize', resizeCanvasToWidth);
      window.addEventListener('orientationchange', resizeCanvasToWidth);

      var active = false;

      var cw, ch, cx, cy, bx, by, timerId;

      // Allow touch/pointer interactions on mobile and desktop
      canvas.style.touchAction = 'none';

      function getXYFromEvent(e) {
        // touchend events may have an empty `touches` list; use `changedTouches` there
        if (e.touches && e.touches.length) {
          const t = e.touches[0];
          return { x: t.clientX, y: t.clientY };
        }
        if (e.changedTouches && e.changedTouches.length) {
          const t = e.changedTouches[0];
          return { x: t.clientX, y: t.clientY };
        }
        // pointer/mouse events
        return { x: e.clientX, y: e.clientY };
      }

      function pointerDownHandler(e) {
        if (timerId) { clearTimeout(timerId); timerId = null; }
        const p = getXYFromEvent(e);
        cw = canvas.clientWidth;
        ch = canvas.clientHeight;
        cx = ((p.x) / cw - 0.5) * 4 * (cw > ch ? (cw / ch) : 1);
        cy = ((-(p.y) / ch + 0.5) * 4 * (ch > cw ? (ch / cw) : 1));
        // capture pointer so we reliably get the up event
        try { e.target && e.target.setPointerCapture && e.target.setPointerCapture(e.pointerId); } catch (err) { }
        if (e.preventDefault) e.preventDefault();
      }

      function pointerUpHandler(e) {
        const p = getXYFromEvent(e);
        cw = canvas.clientWidth;
        ch = canvas.clientHeight;
        bx = ((p.x) / cw - 0.5) * 4 * (cw > ch ? (cw / ch) : 1);
        by = ((-(p.y) / ch + 0.5) * 4 * (ch > cw ? (ch / cw) : 1));
        R = State[0];
        B = pt(bx, by);
        let fv = Euvec(bx - cx, by - cy);
        L = B | fv.Normalized;
        timerId = setTimeout(function () { L = Element.Vector; }, 500);
        try { e.target && e.target.releasePointerCapture && e.target.releasePointerCapture(e.pointerId); } catch (err) { }
        if (e.preventDefault) e.preventDefault();
      }

      function cancelHandler(e) {
        if (timerId) { clearTimeout(timerId); timerId = null; }
        L = Element.Vector;
        try { e.target && e.target.releasePointerCapture && e.target.releasePointerCapture(e.pointerId); } catch (err) { }
      }

      // Prefer pointer events (works for mouse, touch, pen)
      canvas.addEventListener('pointerdown', pointerDownHandler);
      canvas.addEventListener('pointerup', pointerUpHandler);
      canvas.addEventListener('pointercancel', cancelHandler);
      canvas.addEventListener('pointerleave', cancelHandler);

      // Fallback touch handlers for older browsers
      canvas.addEventListener('touchstart', pointerDownHandler, { passive: false });
      canvas.addEventListener('touchend', pointerUpHandler, { passive: false });
      canvas.addEventListener('touchcancel', cancelHandler, { passive: false });

      var btn = document.createElement('button');
      btn.textContent = 'back to center';
      btn.style.cssText = 'margin:8px auto;display:block;padding:8px 18px;font-size:1rem;cursor:pointer;';
      btn.addEventListener('click', function () { State = [1, 0e12]; });
      document.body.appendChild(btn);

      var sliderRow = document.createElement('div');
      sliderRow.style.cssText = 'display:flex;align-items:center;justify-content:center;gap:8px;margin:4px auto;';
      var sliderLabel = document.createElement('label');
      sliderLabel.textContent = 'power:';
      var slider = document.createElement('input');
      slider.type = 'range'; slider.min = '0.5'; slider.max = '4'; slider.step = '0.1'; slider.value = String(power);
      slider.style.width = '180px';
      var sliderVal = document.createElement('span');
      sliderVal.textContent = power.toFixed(1);
      slider.addEventListener('input', function () { power = parseFloat(slider.value); sliderVal.textContent = power.toFixed(1); });
      sliderRow.appendChild(sliderLabel); sliderRow.appendChild(slider); sliderRow.appendChild(sliderVal);
      document.body.appendChild(sliderRow);

      var sliderRow2 = document.createElement('div');
      sliderRow2.style.cssText = 'display:flex;align-items:center;justify-content:center;gap:8px;margin:4px auto;';
      var sliderLabel2 = document.createElement('label');
      sliderLabel2.textContent = 'streamline:';
      var slider2 = document.createElement('input');
      slider2.type = 'range'; slider2.min = '1'; slider2.max = '6'; slider2.step = '0.1'; slider2.value = String(streamline);
      slider2.style.width = '180px';
      var sliderVal2 = document.createElement('span');
      sliderVal2.textContent = streamline.toFixed(1);
      slider2.addEventListener('input', function () { streamline = parseFloat(slider2.value); sliderVal2.textContent = streamline.toFixed(1); });
      sliderRow2.appendChild(sliderLabel2); sliderRow2.appendChild(slider2); sliderRow2.appendChild(sliderVal2);
      document.body.appendChild(sliderRow2);

      var sliderRow3 = document.createElement('div');
      sliderRow3.style.cssText = 'display:flex;align-items:center;justify-content:center;gap:8px;margin:4px auto;';
      var sliderLabel3 = document.createElement('label');
      sliderLabel3.textContent = 'rotation:';
      var slider3 = document.createElement('input');
      slider3.type = 'range'; slider3.min = '0.5'; slider3.max = '2'; slider3.step = '0.1'; slider3.value = String(rotation);
      slider3.style.width = '180px';
      var sliderVal3 = document.createElement('span');
      sliderVal3.textContent = rotation.toFixed(1);
      slider3.addEventListener('input', function () { rotation = parseFloat(slider3.value); sliderVal3.textContent = rotation.toFixed(1); });
      sliderRow3.appendChild(sliderLabel3); sliderRow3.appendChild(slider3); sliderRow3.appendChild(sliderVal3);
      document.body.appendChild(sliderRow3);
    })
  </SCRIPT>
</BODY>
